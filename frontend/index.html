<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinSight AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    
    header { background: #1a1d27; padding: 16px 24px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 20px; color: #00d4aa; font-weight: 600; }
    header span { font-size: 13px; color: #666; }
    
    .chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    
    .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .message.user { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.bot { background: #1a1d27; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2d3a; }
    .message .route-tag { font-size: 11px; color: #00d4aa; margin-bottom: 6px; font-weight: 600; }
    
    .input-area { background: #1a1d27; border-top: 1px solid #2a2d3a; padding: 16px 24px; display: flex; gap: 12px; align-items: flex-end; }
    .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .input-row { display: flex; gap: 8px; }
    
    input, textarea { background: #0f1117; border: 1px solid #2a2d3a; border-radius: 8px; color: #e0e0e0; padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; }
    input:focus, textarea:focus { border-color: #00d4aa; }
    textarea { flex: 1; resize: none; height: 44px; }
    input#ticker { width: 120px; }
    
    button { background: #00d4aa; color: #0f1117; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; height: 44px; }
    button:hover { background: #00b894; }
    button:disabled { background: #2a2d3a; color: #666; cursor: not-allowed; }

    .welcome { text-align: center; margin: auto; color: #444; }
    .welcome h2 { font-size: 28px; color: #00d4aa; margin-bottom: 8px; }
    .welcome p { font-size: 14px; }

    .typing { display: flex; gap: 4px; padding: 12px 16px; background: #1a1d27; border-radius: 12px; align-self: flex-start; border: 1px solid #2a2d3a; }
    .typing span { width: 8px; height: 8px; background: #00d4aa; border-radius: 50%; animation: bounce 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  </style>
</head>
<body>
  <header>
    <h1>⚡ FinSight AI</h1>
    <span>Intelligent Financial Research Assistant</span>
  </header>

  <div class="chat-container" id="chat">
    <div class="welcome">
      <h2>FinSight AI</h2>
      <p>Ask anything about stocks, financials, risk factors, or market data.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-group">
      <div class="input-row">
        <textarea id="question" placeholder="Ask a financial question..." onkeydown="handleKey(event)"></textarea>
        <input id="ticker" type="text" placeholder="Ticker e.g. AAPL" />
        <button onclick="sendMessage()" id="sendBtn">Ask</button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const API = "http://localhost:8000";

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function addMessage(content, type, route = null) {
      const welcome = document.querySelector(".welcome");
      if (welcome) welcome.remove();

      const msg = document.createElement("div");
      msg.className = `message ${type}`;
      if (route) msg.innerHTML = `<div class="route-tag">→ ${route.toUpperCase()}</div>${content}`;
      else msg.innerHTML = content;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    function addTyping() {
      const t = document.createElement("div");
      t.className = "typing";
      t.innerHTML = "<span></span><span></span><span></span>";
      chat.appendChild(t);
      chat.scrollTop = chat.scrollHeight;
      return t;
    }

    async function sendMessage() {
      const question = document.getElementById("question").value.trim();
      const tickerRaw = document.getElementById("ticker").value.trim().toUpperCase();
      const ticker = tickerRaw || "";
      
      if (!question) return;

      addMessage(question, "user");
      document.getElementById("question").value = "";
      document.getElementById("sendBtn").disabled = true;

      const typing = addTyping();

      try {
        const res = await fetch(`${API}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: question, ticker: ticker })
        });
        const data = await res.json();
        typing.remove();
        const answer = data.answer || data.detail || JSON.stringify(data);
        addMessage(answer, "bot", data.route);
      } catch (err) {
        typing.remove();
        addMessage("Error connecting to FinSight API. Make sure the backend is running.", "bot");
      }

      document.getElementById("sendBtn").disabled = false;
    }
  </script>
</body>
</html>
